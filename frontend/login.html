<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Symphony | Professional Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <!-- FIX: Ultra-reliable standard Google Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#db7706", "background-light": "#f8f7f5" }, fontFamily: { "display": ["Inter"] } } } }
    </script>
</head>
<body class="bg-background-light text-slate-900 min-h-screen flex flex-col font-display">
    <header class="flex items-center justify-between border-b border-primary/10 bg-white px-6 py-4 lg:px-12">
        <div class="flex items-center gap-2">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
                <span class="material-icons text-2xl">leaderboard</span>
            </div>
            <h2 class="text-xl font-bold tracking-tight">Symphony</h2>
        </div>
        <div class="flex items-center gap-4">
            <span class="hidden md:block text-sm font-medium text-slate-500">New to Symphony?</span>
            <a href="register.html" class="flex h-10 items-center justify-center rounded-lg bg-primary/10 px-4 text-sm font-bold text-primary hover:bg-primary/20">Create Account</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12 md:py-20">
        <div class="w-full max-w-md space-y-8">
            <div class="text-center md:text-left space-y-2">
                <h1 class="text-4xl font-black tracking-tight md:text-5xl">Welcome Back.</h1>
                <p class="text-lg text-slate-600 font-normal">Securely access your professional workspace.</p>
            </div>

            <div class="bg-white p-8 rounded-xl border border-primary/5 shadow-xl">
                <form id="loginForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold">Business Email</label>
                        <div class="relative group">
                            <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                            <input id="loginEmail" class="w-full h-14 pl-12 pr-4 bg-slate-50 border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="name@company.com" required type="email"/>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-semibold">Password</label>
                            <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot password?</a>
                        </div>
                        <div class="relative flex items-center group">
                            <span class="material-icons absolute left-4 text-slate-400">lock</span>
                            <input id="loginPassword" class="w-full h-14 pl-12 pr-12 bg-slate-50 border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-slate-400" placeholder="Enter your password" required type="password"/>
                            
                            <button id="toggleLoginPasswordBtn" class="absolute right-4 text-slate-400 hover:text-slate-600" type="button">
                                <span id="toggleLoginIcon" class="material-icons text-lg">visibility</span>
                            </button>
                        </div>
                    </div>

                    <button class="w-full h-14 flex items-center justify-center gap-2 rounded-lg bg-primary text-white text-base font-bold shadow-lg hover:bg-primary/90" type="submit">
                        <span>Login to Workspace</span>
                        <span class="material-icons text-lg">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Toggle Password Visibility Logic
        const loginPasswordInput = document.getElementById('loginPassword');
        const toggleLoginPasswordBtn = document.getElementById('toggleLoginPasswordBtn');
        const toggleLoginIcon = document.getElementById('toggleLoginIcon');

        toggleLoginPasswordBtn.addEventListener('click', function() {
            if (loginPasswordInput.type === 'password') {
                loginPasswordInput.type = 'text';
                toggleLoginIcon.textContent = 'visibility_off';
            } else {
                loginPasswordInput.type = 'password';
                toggleLoginIcon.textContent = 'visibility';
            }
        });

        // Database Login Logic
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const loginData = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                // Save email to storage so dashboard knows who is logged in!
                localStorage.setItem('userEmail', loginData.email);

                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const result = await response.json();
                
                if(result.success) {
                    if(result.role === 'manager') {
                        window.location.href = "manager_dashboard.html";
                    } else {
                        window.location.href = "user_dashboard.html";
                    }
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("Database Error: Make sure your Node.js backend is running (node server.js)");
                console.error(error);
            }
        });
    </script>
</body>
</html>
