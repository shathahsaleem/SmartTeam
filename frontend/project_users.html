<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Symphony - Project Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#db7706", "background-light": "#f8f7f5" }, fontFamily: { "display": ["Inter"] } } } }
    </script>
</head>
<body class="bg-background-light font-display text-slate-900 min-h-screen flex flex-col">
    <header class="flex items-center justify-between border-b border-primary/10 bg-white px-6 md:px-10 py-3">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-3 text-primary">
                <span class="material-symbols-outlined text-3xl font-bold">music_note</span>
                <h2 class="text-xl font-black">Symphony</h2>
            </div>
            <!-- Manager Tabs -->
            <nav class="hidden md:flex items-center gap-6">
                <a href="project_users.html" class="text-primary text-sm font-bold border-b-2 border-primary pb-1">Users</a>
                <a href="project_teams.html" class="text-slate-600 text-sm font-semibold hover:text-primary transition-colors">Teams</a>
            </nav>
        </div>
        <a href="manager_project.html" class="text-sm font-bold text-slate-500 hover:text-primary">Back to Projects</a>
    </header>

    <main class="flex-1 max-w-6xl mx-auto w-full p-6 md:p-10 space-y-8">
        <!-- Dynamic Project Info Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 bg-white p-6 rounded-xl border border-primary/10 shadow-sm">
            <div class="flex items-start gap-4">
                <div class="space-y-1">
                    <div class="flex items-center gap-2 text-primary">
                        <span class="material-symbols-outlined !text-sm">folder_open</span>
                        <span class="text-sm font-bold uppercase tracking-wider">Active Project</span>
                    </div>
                    <h1 id="dynManagerTitle" class="text-3xl font-black leading-tight">Loading Project...</h1>
                    <p class="text-slate-500 text-sm max-w-md">Manage team members and track onboarding progress.</p>
                </div>
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
                <div class="bg-primary/5 border border-primary/20 rounded-lg px-6 py-3 flex items-center gap-4">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-primary uppercase">Project Join Code</span>
                        <!-- Dynamic Code Injection -->
                        <span id="dynManagerCode" class="text-xl font-mono font-black tracking-widest text-primary">XXXXXX</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-primary/10 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-primary/10 flex justify-between items-center">
                <h3 class="text-lg font-bold">Enrolled Users</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Name</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-primary/5">
                        <!-- Simulated Database Output -->
                        <tr class="hover:bg-primary/5">
                            <td class="px-6 py-4 font-semibold text-sm">Alex Morgan</td>
                            <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700 uppercase">Quiz Complete</span></td>
                        </tr>
                        <tr class="hover:bg-primary/5">
                            <td class="px-6 py-4 font-semibold text-sm">Jordan Davies</td>
                            <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-amber-100 text-amber-700 uppercase">Pending Quiz</span></td>
                        </tr>
                        <tr class="hover:bg-primary/5">
                            <td class="px-6 py-4 font-semibold text-sm">Sarah Kim</td>
                            <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-emerald-100 text-emerald-700 uppercase">Quiz Complete</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- JS to update header dynamically -->
    <script>
        const title = localStorage.getItem('managerCurrentProject') || "Global Expansion Q4";
        const code = localStorage.getItem('managerCurrentCode') || "PRJ-99";
        
        document.getElementById('dynManagerTitle').textContent = title;
        document.getElementById('dynManagerCode').textContent = code;
    </script>
</body>
</html>
