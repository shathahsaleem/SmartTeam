<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <!-- FIX: Ultra-reliable standard Google Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#db7706", "background-light": "#f8f7f5" },
                    fontFamily: { "display": ["Inter"] }
                }
            }
        }
    </script>
    <title>Symphony - Initialize Your Account</title>
</head>
<body class="font-display bg-background-light text-slate-900 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
    <header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 lg:px-20">
        <div class="flex items-center gap-3 text-primary">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
                <span class="material-icons">account_tree</span>
            </div>
            <h2 class="text-xl font-bold">Symphony</h2>
        </div>
        <div class="hidden md:block">
            <p class="text-sm font-medium text-slate-500">Already have an account? <a class="text-primary hover:underline" href="login.html">Log in</a></p>
        </div>
    </header>

    <main class="flex flex-1 items-center justify-center py-12 px-4 md:px-6">
        <div class="w-full max-w-[520px] space-y-8 rounded-xl bg-white p-8 shadow-sm border border-slate-200">
            <div class="space-y-2">
                <h1 class="text-3xl font-extrabold md:text-4xl">Initialize Your Account.</h1>
                <p class="text-base text-slate-500">Select your professional role to begin optimizing your team flows.</p>
            </div>

            <form id="registerForm" class="space-y-6">
                <div class="space-y-3">
                    <p class="text-sm font-semibold uppercase tracking-wider text-slate-500">Identify your role</p>
                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                        
                        <!-- Member Card -->
                        <label class="relative flex cursor-pointer flex-col rounded-lg border-2 p-4 transition-all duration-200 border-slate-200 bg-transparent hover:border-primary/50 has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                            <input checked name="role" type="radio" value="member" class="sr-only peer">
                            <span class="material-icons mb-2 text-slate-400 peer-checked:text-primary transition-colors">groups</span>
                            <span class="block text-sm font-bold">Project Member</span>
                            <div class="absolute top-2 right-2 text-primary hidden peer-checked:block">
                                <span class="material-icons text-base">check_circle</span>
                            </div>
                        </label>

                        <!-- Manager Card -->
                        <label class="relative flex cursor-pointer flex-col rounded-lg border-2 p-4 transition-all duration-200 border-slate-200 bg-transparent hover:border-primary/50 has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                            <input name="role" type="radio" value="manager" class="sr-only peer">
                            <!-- Changed to manage_accounts for a better manager icon -->
                            <span class="material-icons mb-2 text-slate-400 peer-checked:text-primary transition-colors">manage_accounts</span>
                            <span class="block text-sm font-bold">Project Manager</span>
                            <div class="absolute top-2 right-2 text-primary hidden peer-checked:block">
                                <span class="material-icons text-base">check_circle</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium">Full Name</label>
                        <input id="fullName" class="flex h-12 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 focus:border-primary focus:ring-2 focus:ring-primary/20" placeholder="John Doe" type="text" required>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium">Business Email</label>
                        <input id="email" class="flex h-12 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 focus:border-primary focus:ring-2 focus:ring-primary/20" placeholder="name@company.com" type="email" required>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-medium">Password</label>
                        <div class="relative flex items-center">
                            <input id="password" class="flex h-12 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 focus:border-primary focus:ring-2 focus:ring-primary/20" placeholder="Create a secure password" type="password" required>
                            <button id="togglePasswordBtn" class="absolute right-3 text-slate-400 hover:text-slate-600" type="button">
                                <span id="toggleIcon" class="material-icons text-lg">visibility</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <button class="inline-flex h-12 w-full items-center justify-center rounded-lg bg-primary px-6 text-base font-semibold text-white hover:bg-primary/90" type="submit">
                        Create Professional Account
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    // Toggle Password Visibility Logic
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');
    const toggleIcon = document.getElementById('toggleIcon');

    togglePasswordBtn.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text'; 
            toggleIcon.textContent = 'visibility_off'; 
        } else {
            passwordInput.type = 'password'; 
            toggleIcon.textContent = 'visibility'; 
        }
    });

    // Database Registration & Routing Logic
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 

        const roleRadios = document.getElementsByName('role');
        let selectedRole = 'member';
        for(let radio of roleRadios) {
            if(radio.checked) selectedRole = radio.value;
        }

        const userData = {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: selectedRole
        };

        try {
            localStorage.setItem('userEmail', userData.email);

            const response = await fetch('http://localhost:3000/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            const result = await response.json();
            
            if(result.success) {
                if(selectedRole === 'manager') {
                    alert("Account successfully created! Welcome to the Manager Dashboard.");
                    window.location.href = "manager_dashboard.html";
                } else {
                    alert("Account successfully created! Let's take your personality quiz.");
                    window.location.href = "personality_quiz.html";
                }
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            alert("Database Error: Make sure your Node.js backend is running (node server.js)");
            console.error(error);
        }
    });
</script>
</body>
</html>
